name: JobBot Automation

on:
  schedule:
    # Run daily at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

jobs:
  run-jobbot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          # JobSpy uses playwright for some scrapers (e.g., LinkedIn/Indeed)
          playwright install --with-deps chromium

      - name: Decode Google Credentials
        if: env.GOOGLE_SHEETS_CRED_FILE_B64 != ''
        run: |
          echo "${{ secrets.GOOGLE_SHEETS_CRED_FILE_B64 }}" | base64 -d > credentials.json
        env:
          GOOGLE_SHEETS_CRED_FILE_B64: ${{ secrets.GOOGLE_SHEETS_CRED_FILE_B64 }}

      - name: Run JobBot
        # continue-on-error ensures log/artifact upload even if the script fails
        continue-on-error: true
        run: python main.py --now
        env:
          # API Keys & Credentials
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEETS_CRED_FILE: "credentials.json"
          # Environmental overrides
          PYTHONUNBUFFERED: "1"

      - name: Archive Job Results (CSV)
        uses: actions/upload-artifact@v4
        with:
            name: job-results
            path: output/*.csv
            retention-days: 30

      - name: Archive Logs (Debugging)
        uses: actions/upload-artifact@v4
        with:
            name: jobbot-logs
            path: logs/*.log
            retention-days: 14
