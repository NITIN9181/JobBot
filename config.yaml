# ==========================================
# JobBot Configuration File
# ==========================================

# List of job titles you want to search for
# Focused on AI/ML/SDE roles for freshers
search_terms: 
  - "AI Engineer"
  - "Machine Learning Engineer"
  - "ML Engineer"
  - "Data Scientist"
  - "Software Development Engineer"
  - "SDE"
  - "Deep Learning Engineer"
  - "NLP Engineer"
  - "Computer Vision Engineer"
  - "Data Engineer"
  - "MLOps Engineer"
  - "AI/ML Intern"
  - "Junior Data Scientist"

# List of skills that must be present in labels/description
# AI/ML/SDE focused skill stack
skills:
  - "python"
  - "machine learning"
  - "deep learning"
  - "tensorflow"
  - "pytorch"
  - "data science"
  - "nlp"
  - "computer vision"
  - "sql"
  - "aws"
  - "docker"
  - "pandas"
  - "scikit-learn"
  - "llm"
  - "generative ai"
  - "transformers"

# Minimum annual salary (set low for India fresher roles, many don't list salary)
# Set to 0 to disable salary filtering (recommended for freshers)
min_salary: 0

# Type of job: "full-time", "part-time", "contract", "internship"
job_type: "full-time"

# Country code for search (e.g., "USA", "UK", "Canada", "India")
country: "India"

# Number of results to fetch per job board (LinkedIn, Indeed, ZipRecruiter, Glassdoor)
results_per_site: 50

# Target country for India-eligibility filter
target_country: "India"

# Experience level filter settings
experience:
  level: "fresher"  # fresher | junior | mid | senior | any
  max_years: 1      # Maximum years of experience allowed for 'fresher' level

# Only fetch jobs posted within the last N hours
hours_old: 24

# Companies you want to completely exclude from the search
blacklisted_companies:
  - "CyberCoders"
  - "Revature"

# Time to run the automation daily (in 24-hour format HH:MM)
schedule_time: "09:00"

# Notification settings
notifications:
  email_enabled: true
  telegram_enabled: false


# AI Scoring settings (NVIDIA Version)
ai_scoring:
  enabled: true                          # Set to false to disable AI scoring
  min_score: 70                          # Only show jobs scoring above this %
  model: "openai/gpt-oss-120b"          # Best-in-class reasoning MoE model
  batch_mode: false                      # Set to true for faster scoring (less accurate)
  max_jobs_to_score: 50                  # Limit API calls by only scoring top N jobs
